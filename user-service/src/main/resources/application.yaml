server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:mysql://user-mysql:3306/user_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Vinay@444}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 600000

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:user-service}
    EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    instance-id: ${spring.application.name}:${server.port}

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-service:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cache: DEBUG